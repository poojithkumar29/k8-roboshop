apiVersion: v1
kind: ConfigMap
metadata:
  project: roboshop
  component: user
  tier: backend
data: 
  MONGO: "true"
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"

apiVersion: app/v1
kind: Deployment
metadata: 
  name: roboshop
  namespace: roboshop
  labels: 
    project: roboshop
    component: user
    tier: backend
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: user
      tier: backend
  template:
    metadata:
      labels: 
        project: roboshop
        component: user
        tier: backend
  spec:
    containers:
    - name: user
      image: poojithkumar29/user
      imagePullPolicy: Always
    ports: 
    - name: liveness-port
      containerPort: 8080
      readinessProbe:
        httpGet: 
          path: /health
          port: liveness-port
        failureThreshold: 1
        periodSeconds: 15
      livenessProbe:
        httpGet: 
          path: /health
          port: liveness-port
        failureThreshold: 1
        periodSeconds: 15
-------------------

apiVersion: v1
kind: Service
metadata: 
  name: user
  namespace: roboshop
  labels: 
    project: roboshop
    component: user
    tier: backend
spec: 
  selector: 
    project: roboshop
    component: user
    tier: backend
  port:
  - protocol: Tcp
    port: 8080
    targetPort: 8080
