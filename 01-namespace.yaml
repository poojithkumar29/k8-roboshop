apiVersion: v1
kind: Namespace
metadata:
  name: roboshop
  labels: 
    project: roboshop
    environment: development
    tier: backend
spec: 
  replicas: 1
  selector:
    matchLabels:
      project: roboshop
      component: user
      tier: backend
  template:
    metadata:
      labels: 
        project: roboshop
        component: user
        tier: backend
    spec:
      containers: 
      - name: user
        image: poojithkumar29/user:v1
        imagePullPolicy: Always
        ports: 
        - name: livenss-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
         failureThreshold: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
         failureThreshold: 20
---

apiVersion: v1
kind: Service
metadata: 
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    component: user
    tier: backend
spec:
  selector: 
    project: roboshop
    component: user
    tier: backend
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080





